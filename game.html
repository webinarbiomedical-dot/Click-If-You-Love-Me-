<!DOCTYPE html>
<html>
<head>
  <title>Do you love me?</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      background: linear-gradient(135deg, #ffe6f0, #fff);
      overflow: hidden;
    }

    h1 { color: #d63384; }

    button {
      padding: 15px 30px;
      border-radius: 30px;
      border: none;
      font-size: 18px;
    }

    #yes { background: #ff4d6d; color: white; }
    #no { background: #ccc; position: absolute; }

    .msg {
      display: none;
      margin-top: 20px;
      font-size: 22px;
      color: #d63384;
    }
  </style>
</head>

<body>

<h1 id="title"></h1>

<button id="yes">Yes ❤️</button>
<button id="no">No 💔</button>

<div class="msg" id="msg">I knew it ❤️</div>

<script>
let name = localStorage.getItem("name") || "Shel";
document.getElementById("title").innerText = `Do you love me, ${name}?`;

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");

noBtn.addEventListener("mouseover", () => {
  noBtn.style.left = Math.random() * window.innerWidth + "px";
  noBtn.style.top = Math.random() * window.innerHeight + "px";
});

yesBtn.addEventListener("click", () => {
  document.getElementById("msg").style.display = "block";
  setTimeout(() => {
    window.location.href = "letter.html";
  }, 1500);
});
</script>

</body>
</html>
