<!DOCTYPE html>
<html>
<head>
  <title>Start</title>
  <style>
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      background: linear-gradient(135deg, #ffe6f0, #fff);
    }
    .box { text-align: center; }
    input {
      padding: 10px;
      font-size: 18px;
      border-radius: 10px;
    }
    button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      background: #ff4d6d;
      color: white;
      border-radius: 20px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Enter your name 💖</h2>
  <input id="name" placeholder="Shel" />
  <br>
  <button onclick="start()">Start</button>
</div>

<script>
function start() {
  let name = document.getElementById("name").value || "Shel";
  localStorage.setItem("name", name);
  window.location.href = "game.html";
}
</script>

</body>
</html>
