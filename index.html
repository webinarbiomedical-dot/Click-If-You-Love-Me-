<!DOCTYPE html>
<html>
<head>
<title>Start</title>
<style>
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background:linear-gradient(135deg,#ffe6f0,#fff);
}
button,input{
  padding:10px;
  border-radius:10px;
  border:none;
}
button{background:#ff4d6d;color:white;margin-top:10px;}
</style>
</head>

<body>

<div style="text-align:center">
<h2>💖 Enter your name</h2>
<input id="name" placeholder="Shel">
<br>
<button onclick="go()">Start</button>
</div>

<script>
function go(){
  let n=document.getElementById("name").value || "You";
  localStorage.setItem("name",n);
  window.location.href="game1.html";
}
</script>

</body>
</html>
